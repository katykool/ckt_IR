{% extends "base.html" %}
{% block title %}Chukchi IR — Поиск{% endblock %}

{% block extra_style %}
<style>
  .search-header {
    margin-bottom: 3rem;
    padding-bottom: 2rem;
    border-bottom: 1px solid var(--border);
  }

  .search-header h1 {
    font-family: 'Unbounded', sans-serif;
    font-size: 2.5rem;
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: .5rem;
  }

  .search-header p {
    color: var(--muted);
    font-style: italic;
  }

  /* ── форма ── */
  .search-form {
    display: flex;
    flex-direction: column;
    gap: 2rem;
  }

  .field-group {
    display: flex;
    flex-direction: column;
    gap: .5rem;
  }

  label {
    font-family: 'Unbounded', sans-serif;
    font-size: .7rem;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--ink);
  }

  .query-input {
    width: 100%;
    font-family: 'Spectral', serif;
    font-size: 1.4rem;
    padding: 1rem 1.25rem;
    border: 2px solid var(--ink);
    background: var(--paper);
    color: var(--ink);
    outline: none;
    transition: border-color .2s;
  }

  .query-input:focus {
    border-color: var(--rust);
  }

  .query-input::placeholder {
    color: var(--border);
    font-style: italic;
  }

  /* ── параметры ── */
  .params-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1.5rem;
  }

  select, input[type="number"] {
    width: 100%;
    font-family: 'Spectral', serif;
    font-size: 1rem;
    padding: .6rem 1rem;
    border: 1px solid var(--border);
    background: var(--paper);
    color: var(--ink);
    outline: none;
    cursor: pointer;
    appearance: none;
    transition: border-color .2s;
  }

  select:focus, input[type="number"]:focus {
    border-color: var(--rust);
  }

  .select-wrapper {
    position: relative;
  }

  .select-wrapper::after {
    content: '▾';
    position: absolute;
    right: 1rem;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    color: var(--muted);
    font-size: .8rem;
  }

  /* ── чекбокс ── */
  .checkbox-row {
    display: flex;
    align-items: center;
    gap: .75rem;
    cursor: pointer;
  }

  .checkbox-row input[type="checkbox"] {
    width: 1.2rem;
    height: 1.2rem;
    accent-color: var(--rust);
    cursor: pointer;
  }

  .checkbox-label {
    font-size: .9rem;
    color: var(--ink);
  }

  /* ── режим ── */
  .mode-tabs {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .mode-tab {
    flex: 1;
    display: none;
  }

  .mode-tab + label {
    flex: 1;
    padding: .6rem 1rem;
    text-align: center;
    font-family: 'Unbounded', sans-serif;
    font-size: .65rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    cursor: pointer;
    border-right: 1px solid var(--border);
    background: var(--paper);
    color: var(--muted);
    transition: background .2s, color .2s;
    user-select: none;
  }

  .mode-tab:last-of-type + label { border-right: none; }

  .mode-tab:checked + label {
    background: var(--ink);
    color: var(--paper);
  }

  /* ── кнопка подачи ── */
  .submit-row {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
  }

  .error-msg {
    color: var(--rust);
    font-style: italic;
    font-size: .9rem;
  }
</style>
{% endblock %}

{% block content %}
<div class="search-header">
  <h1>Поиск</h1>
  <p>Введите запрос на чукотском языке</p>
</div>

{% if error %}
<p class="error-msg" style="margin-bottom:1.5rem;">{{ error }}</p>
{% endif %}

<form class="search-form" method="POST" action="/search">

  <div class="field-group">
    <label for="query">Запрос</label>
    <input
      class="query-input"
      type="text"
      id="query"
      name="query"
      placeholder="ӄораӈы…"
      autocomplete="off"
      autofocus
      value="{{ request.form.get('query', '') }}"
    >
  </div>

  <div class="params-grid">
    <div class="field-group">
      <label for="index">Модель индексирования</label>
      <div class="select-wrapper">
        <select name="index" id="index">
          <option value="bm25"    {% if request.form.get('index','bm25')=='bm25'    %}selected{% endif %}>BM25</option>
          <option value="w2v"     {% if request.form.get('index')=='w2v'     %}selected{% endif %}>Word2Vec</option>
          <option value="ri"      {% if request.form.get('index')=='ri'      %}selected{% endif %}>Random Indexing</option>
          <option value="fasttext"{% if request.form.get('index')=='fasttext'%}selected{% endif %}>FastText</option>
        </select>
      </div>
    </div>

    <div class="field-group">
      <label for="top_k">Количество результатов</label>
      <input type="number" id="top_k" name="top_k" min="1" max="20"
             value="{{ request.form.get('top_k', 5) }}">
    </div>
  </div>

  <div class="field-group">
    <label>Режим</label>
    <div class="mode-tabs">
      <input class="mode-tab" type="radio" name="mode" id="mode-all"       value="all"       {% if request.form.get('mode','all')=='all'       %}checked{% endif %}>
      <label for="mode-all">Поиск + рекомендации</label>
      <input class="mode-tab" type="radio" name="mode" id="mode-search"    value="search"    {% if request.form.get('mode')=='search'    %}checked{% endif %}>
      <label for="mode-search">Только поиск</label>
      <input class="mode-tab" type="radio" name="mode" id="mode-recommend" value="recommend" {% if request.form.get('mode')=='recommend' %}checked{% endif %}>
      <label for="mode-recommend">Только рекомендации</label>
    </div>
  </div>

  <label class="checkbox-row">
    <input type="checkbox" name="spellcheck"
           {% if request.form.get('spellcheck')=='on' %}checked{% endif %}>
    <span class="checkbox-label">Исправить опечатки перед поиском</span>
  </label>

  <div class="submit-row">
    <button type="submit" class="btn btn-rust">Найти →</button>
  </div>

</form>
{% endblock %}
